<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Tempero Brasileiro</title>

<link rel="icon" type="image/png" href="IMAGEM/favicon.png.png">

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>


<p class="teste-css">TESTE DO CSS</p>

<body class="login-page">

<div class="login-container">

<div class="login-box">

<div class="titulo-login">

    <div class="logo-redonda">
        <i class="fa-solid fa-hat-chef"></i>
        <i class="fa-solid fa-utensils"></i>
    </div>

    <div class="titulo-com-enfeites">
        <span class="enfeite">❧</span>

        <h1>
            <span>Tempero</span>
            <strong>Brasileiro</strong>
        </h1>

        <span class="enfeite espelhado">❧</span>
    </div>

    <p>Entre para acessar receitas incríveis</p>

</div>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="E-mail"
required>

<input
type="password"
id="senha"
placeholder="Senha"
required>

<button type="submit">
Entrar
</button>

</form>

<div class="login-links">
<a href="cadastro.html">Criar conta</a>
<a href="recuperar-senha.html">Esqueci senha</a>
</div>

</div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", function(e){

e.preventDefault();

const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;

const emailSalvo = localStorage.getItem("email");
const senhaSalva = localStorage.getItem("senha");

if(email === emailSalvo && senha === senhaSalva){

window.location.href = "index.html";

}else{

alert("Email ou senha incorretos!");

}

});

</script>
   

</body>
</html>
