<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro - Tempero Brasileiro</title>

<link rel="icon" type="image/png" href="IMAGEM/favicon.png.png">

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body class="login-page">

<div class="login-container">

<div class="login-box">

<h1>🌿 Criar Conta</h1>
<p>Cadastre-se para acessar as receitas</p>

<form id="cadastroForm">

<input
type="email"
id="email"
placeholder="E-mail"
required>

<input
type="password"
id="senha"
placeholder="Senha"
required>

<button type="submit">
Cadastrar
</button>

</form>

<div class="login-links">
<a href="login.html">Já tenho conta</a>
</div>

</div>

</div>

<script>

window.onload = function() {

    var form = document.getElementById("cadastroForm");

    form.onsubmit = function(e) {

        e.preventDefault();

        var email = document.getElementById("email").value;
        var senha = document.getElementById("senha").value;

        localStorage.setItem("email", email);
        localStorage.setItem("senha", senha);

        alert("Conta criada com sucesso!");

        window.location.href = "login.html";

        return false;
    };

};

</script>

</body>
</html>
