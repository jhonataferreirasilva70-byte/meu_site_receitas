<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="favicon.png.png">

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<header class="topo-site">

    <a href="index.html" class="logo">
        <i class="fa-solid fa-pepper-hot"></i>
        <span class="tempero">Tempero</span>
        <span class="brasileiro">Brasileiro</span>
    </a>

    <div class="acoes-topo">
        <button id="toggleTema" class="btn-tema">
            <i class="fa-solid fa-moon"></i>
        </button>
    </div>

</header>

<section class="receita-pagina">

    <div class="topo-receita">

        <img id="imagemReceita" src="" alt="Imagem da receita">

        <div class="info-topo">

            <span class="tag" id="regiaoReceita"></span>

            <h1 id="tituloReceita"></h1>

            <p id="descricaoReceita"></p>

        </div>

    </div>

    <div class="receita-corpo">

        <aside class="lateral">

            <h2>🥘 Ingredientes</h2>

            <ul id="listaIngredientes"></ul>

        </aside>

        <main class="preparo">

            <h2>👨‍🍳 Modo de preparo</h2>

            <div id="listaPreparo"></div>

            <a id="videoReceita" target="_blank" class="voltar">
                ▶ Assistir Receita em Vídeo
            </a>

            <br><br>

            <a href="index.html" class="voltar">
                ⬅ Voltar ao Início
            </a>

        </main>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
